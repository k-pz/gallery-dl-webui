site_name: gallery-dl-webui
site_description: A small web UI for gallery-dl, backed by FastAPI.
site_url: https://k-pz.github.io/gallery-dl-webui/
repo_url: https://github.com/k-pz/gallery-dl-webui
repo_name: k-pz/gallery-dl-webui
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

# README.md inside docs/ is a sidebar for GitHub browsers — the docs site uses
# the generated index.md instead, so this prevents a collision under MkDocs'
# `use_directory_urls`. design/ holds source images for screenshots, not pages.
exclude_docs: |
  README.md
  design/

# Don't fail the strict build on relative links inherited from README.md that
# point at files outside docs/ (gen_index.py rewrites them to GitHub URLs, but
# `relative_to_docs` would still treat the original input as suspect during
# the include phase). External absolute links are validated by browsers, not
# the build.
validation:
  links:
    unrecognized_links: ignore
  omitted_files: warn
  absolute_links: ignore

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.tabs
    - navigation.indexes
    - content.code.copy
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle: { icon: material/brightness-7, name: Switch to dark mode }
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle: { icon: material/brightness-4, name: Switch to light mode }
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - gen-files:
      scripts:
        - scripts/gen_index.py
        - scripts/gen_python_ref.py
        - scripts/gen_http_api.py
  - literate-nav
  - mkdocstrings:
      handlers:
        python:
          paths: [backend/src]
          options:
            docstring_style: google
            show_signature_annotations: true
            separate_signature: true
            show_source: false
            show_if_no_docstring: true
            members_order: source
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Architecture & internals:
      - Architecture: architecture.md
      - Backend: backend.md
      - Download pipeline: pipeline.md
      - Frontend: frontend.md
      - Lifecycles: lifecycles.md
      - Testing: testing.md
      - Deployment: deployment.md
      - Design decisions: decisions.md
  - API reference:
      - HTTP API: reference/http-api.md
      - Python:
          - Core: reference/python/core.md
          - Downloads: reference/python/downloads.md
          - Targets: reference/python/targets.md
          - Library: reference/python/library.md
          - App config: reference/python/app-config.md
          - Output dirs: reference/python/output-dirs.md
          - Health: reference/python/health.md
      - Frontend: reference/frontend/README.md
  - Components: https://k-pz.github.io/gallery-dl-webui/storybook/
