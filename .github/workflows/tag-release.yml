name: tag-release

# Publishes a GitHub Release for a `v*` tag. Triggered in three ways:
#
#   - `workflow_run` off `release.yml` — the normal path. The release
#     workflow uploads a `release-tag` artifact containing the tag it just
#     pushed; we download it here. We can't use `push: tags: v*` for this
#     case because the release workflow pushes via `GITHUB_TOKEN`, and
#     GitHub silently suppresses workflow triggers for events created by
#     `GITHUB_TOKEN` (to prevent recursive runs).
#
#   - `push: tags: v*` — handles tags pushed by a human (i.e. not via
#     `GITHUB_TOKEN`), so an out-of-band `git push origin vX.Y.Z` still
#     auto-publishes a Release.
#
#   - `workflow_dispatch` — manual escape hatch to (re)publish a Release
#     for an existing tag.
#
# After publishing, we re-upload the `release-tag` artifact so
# `docker-release.yml` (which chains off this workflow via `workflow_run`)
# can read the same tag without re-deriving it.

on:
  workflow_run:
    workflows: [release]
    types: [completed]
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing v* tag to (re)publish, e.g. v1.0.0"
        required: true
        type: string

permissions:
  contents: write
  actions: read

jobs:
  publish:
    # On workflow_run, only proceed if the upstream release workflow
    # actually succeeded. On other triggers, always proceed.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download release-tag artifact (workflow_run path)
        if: github.event_name == 'workflow_run'
        id: dl
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: release-tag
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts

      - name: Resolve tag
        id: ver
        # Tag source depends on the trigger:
        #   workflow_run    → artifact uploaded by release.yml (may be
        #                     absent if the release workflow was a no-op
        #                     because `cz bump` had nothing to bump).
        #   push            → GITHUB_REF (refs/tags/vX.Y.Z).
        #   workflow_dispatch → input.
        # A `-` in the version (e.g. `v1.2.0-rc.1`) marks a semver
        # prerelease — we surface that so the Release gets flagged as
        # a prerelease on GitHub.
        run: |
          case "${{ github.event_name }}" in
            workflow_run)
              if [ ! -f artifacts/tag ]; then
                echo "Upstream release workflow did not produce a release-tag artifact — nothing to publish."
                echo "skip=true" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              tag=$(cat artifacts/tag)
              ;;
            push)
              tag="${GITHUB_REF##*/}"
              ;;
            workflow_dispatch)
              tag="${{ inputs.tag }}"
              ;;
          esac
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          case "$version" in
            *-*) echo "prerelease=true"  >> "$GITHUB_OUTPUT" ;;
            *)   echo "prerelease=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Checkout
        if: steps.ver.outputs.skip != 'true'
        uses: actions/checkout@v5
        with:
          # For workflow_dispatch (manual backfill), check out main so the
          # release notes reflect any post-tag CHANGELOG edits — e.g. when
          # we want to retroactively rewrite an empty stable section.
          # Other triggers pin to the tagged commit so notes match exactly
          # what was released.
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || steps.ver.outputs.tag }}
          fetch-depth: 0

      - name: Extract release notes from CHANGELOG
        if: steps.ver.outputs.skip != 'true'
        id: notes
        # Pull just this version's section out of CHANGELOG.md (between
        # this version's `## vX.Y.Z` heading and the next one). If the
        # CHANGELOG isn't present at this tag, fall back to a one-liner.
        run: |
          version="${{ steps.ver.outputs.version }}"
          tag="${{ steps.ver.outputs.tag }}"
          out=release-notes.md
          if [ -f CHANGELOG.md ]; then
            awk -v v="$tag" '
              $0 ~ "^## " v "( |$)" { in_section=1; next }
              in_section && /^## v[0-9]/ { exit }
              in_section { print }
            ' CHANGELOG.md > "$out"
          fi
          if [ ! -s "$out" ]; then
            echo "Release $tag" > "$out"
          fi
          echo "path=$out" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        if: steps.ver.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Idempotent: if the Release already exists (e.g. a workflow_dispatch
        # backfill), update its notes in place. Otherwise create it. Prerelease
        # state is only set at creation — we don't flip it on backfill.
        run: |
          tag="${{ steps.ver.outputs.tag }}"
          notes="${{ steps.notes.outputs.path }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --notes-file "$notes"
          else
            prerelease_flag=""
            if [ "${{ steps.ver.outputs.prerelease }}" = "true" ]; then
              prerelease_flag="--prerelease"
            fi
            gh release create "$tag" \
              --title "$tag" \
              $prerelease_flag \
              --notes-file "$notes"
          fi

      - name: Forward release-tag artifact to docker-release
        if: steps.ver.outputs.skip != 'true'
        run: |
          mkdir -p forward && echo "${{ steps.ver.outputs.tag }}" > forward/tag

      - name: Upload release-tag artifact
        if: steps.ver.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-tag
          path: forward/tag
          if-no-files-found: error
          retention-days: 7
