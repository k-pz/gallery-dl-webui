name: docker-release

# Builds and pushes the container image to GHCR after `tag-release` finishes
# publishing the GitHub Release. We chain via `workflow_run` instead of the
# more obvious `on: release` because GitHub suppresses the `release.published`
# event when the release is created by `GITHUB_TOKEN` (which is what
# `tag-release.yml` uses) — so the release-triggered form silently never
# fired. Chaining off tag-release also preserves the original guarantee: if
# the Release step fails, the `conclusion == 'success'` guard short-circuits
# this run, so a tag whose Release fails never produces a half-shipped image.
#
# The tag to build is read from a `release-tag` artifact uploaded by
# `tag-release.yml`. We can't use `workflow_run.head_branch` anymore because
# `tag-release.yml` now runs on `main` (via workflow_run off `release.yml`)
# rather than on a tag push, so `head_branch` would be `main`.
#
# `workflow_dispatch` is kept as a manual escape hatch — handy when a release
# already exists (e.g. v1.0.0, which predates this fix) and we need to ship
# its image after the fact, or to retry a build that failed mid-push.
#
# Image is tagged with the release version (`vX.Y.Z`, plus the bare semver),
# `X.Y` minor lineage, and `latest`. We also build a SHA tag for traceability.
# Pre-release tags (e.g. `v1.2.0-rc.1`) skip `latest` and the `X.Y` lineage so
# an rc never floats on top of a stable release for `:latest` consumers.

on:
  workflow_run:
    workflows: [tag-release]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing v* tag to (re)build, e.g. v1.0.0"
        required: true
        type: string

permissions:
  contents: read
  packages: write
  actions: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    # On workflow_run, only proceed if the upstream tag-release succeeded AND
    # was itself triggered by something other than `workflow_dispatch`. The
    # dispatch trigger on tag-release.yml is the "re-publish an existing tag"
    # escape hatch (e.g. backfilling release notes for v1.1.0); we don't want
    # those backfills to rebuild and re-push an effectively-immutable image
    # with a slightly different build (updated base layer, different action
    # versions, etc.). On workflow_dispatch of this workflow, always proceed
    # (operator explicitly asked to rebuild).
    if: |
      github.event_name == 'workflow_dispatch'
      || (github.event.workflow_run.conclusion == 'success'
          && github.event.workflow_run.event != 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Download release-tag artifact (workflow_run path)
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: release-tag
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts

      - name: Resolve tag to build
        id: tag
        # tag-release forwards the published tag as a `release-tag` artifact;
        # we can't use `workflow_run.head_branch` because tag-release now
        # runs on `main` (via workflow_run off the release workflow) rather
        # than on a tag push. For manual dispatch we take the tag from input.
        env:
          # Expanded via env, never interpolated into the script body —
          # same convention tag-release.yml documents for its tag input.
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="$DISPATCH_TAG"
          else
            tag=$(cat artifacts/tag)
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Checkout (at the release tag)
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Set up QEMU (for cross-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # On a release tag like `v1.2.3` we emit:
          #   - v1.2.3, 1.2.3   ← exact-version tags
          #   - 1.2             ← minor lineage (handy for compose pinning)
          #   - latest          ← floats on the newest stable release
          #   - sha-<short>     ← traceability back to the source commit
          # For prerelease tags like `v1.2.0-rc.1` we emit only the exact-
          # version tags and the sha tag: `type=semver` skips `{{major}}.{{minor}}`
          # for prereleases by default, and the `enable=` guard below skips
          # `latest`. The guard mirrors tag-release.yml's prerelease check
          # (a `-` in the version marks a semver prerelease).
          tags: |
            type=semver,pattern={{version}},value=${{ steps.tag.outputs.tag }}
            type=semver,pattern=v{{version}},value=${{ steps.tag.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.tag.outputs.tag }}
            type=raw,value=latest,enable=${{ !contains(steps.tag.outputs.tag, '-') }}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
