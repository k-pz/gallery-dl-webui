name: docker-release

# Builds and pushes the container image to GHCR after `tag-release` finishes
# publishing the GitHub Release. We chain via `workflow_run` instead of the
# more obvious `on: release` because GitHub suppresses the `release.published`
# event when the release is created by `GITHUB_TOKEN` (which is what
# `tag-release.yml` uses) — so the release-triggered form silently never
# fired. Chaining off tag-release also preserves the original guarantee: if
# the Release step fails, the `conclusion == 'success'` guard short-circuits
# this run, so a tag whose Release fails never produces a half-shipped image.
#
# `workflow_dispatch` is kept as a manual escape hatch — handy when a release
# already exists (e.g. v1.0.0, which predates this fix) and we need to ship
# its image after the fact, or to retry a build that failed mid-push.
#
# Image is tagged with the release version (`vX.Y.Z`, plus the bare semver),
# `X.Y` minor lineage, and `latest`. We also build a SHA tag for traceability.

on:
  workflow_run:
    workflows: [tag-release]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing v* tag to (re)build, e.g. v1.0.0"
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    # On workflow_run, only proceed if the upstream tag-release succeeded.
    # On workflow_dispatch, always proceed (operator explicitly asked).
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag to build
        id: tag
        # `workflow_run.head_branch` holds the short tag name (e.g. `v1.2.3`)
        # when the upstream workflow was triggered by a tag push, which is
        # the only way tag-release runs. For manual dispatch we take it
        # straight from the input.
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${{ github.event.workflow_run.head_branch }}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Checkout (at the release tag)
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Set up QEMU (for cross-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # On a release tag like `v1.2.3` we emit:
          #   - v1.2.3, 1.2.3   ← exact-version tags
          #   - 1.2             ← minor lineage (handy for compose pinning)
          #   - latest          ← floats on the newest release
          #   - sha-<short>     ← traceability back to the source commit
          tags: |
            type=semver,pattern={{version}},value=${{ steps.tag.outputs.tag }}
            type=semver,pattern=v{{version}},value=${{ steps.tag.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.tag.outputs.tag }}
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
