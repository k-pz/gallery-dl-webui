name: ci

# Lint, typecheck and test the whole repo on every PR + push to main.
# Each suite (backend pytest, frontend vitest, Playwright e2e) runs in its
# own job. Unit-test jobs upload coverage as workflow artifacts and write
# a one-line summary to the job page; the e2e job uploads the Playwright
# HTML report on failure.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same branch — only the latest commit's
# results matter, and PRs typically rebase several times.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - name: Install uv (with pinned Python)
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Sync backend deps
        run: uv sync --frozen

      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Typecheck (ty)
        run: uv run ty check

      - name: Test (pytest + coverage)
        run: |
          uv run pytest \
            --cov=backend \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            | tee pytest-output.txt

      - name: Append coverage summary
        if: always()
        run: |
          {
            echo "### Backend coverage"
            echo
            echo '```'
            sed -n '/^---* coverage:/,/^TOTAL/p' pytest-output.txt || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            backend/coverage.xml
            backend/htmlcov/
          if-no-files-found: warn
          retention-days: 14

  frontend:
    name: frontend (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # The "packageManager" field lives in frontend/package.json, not at
          # the repo root where the action looks by default.
          package_json_file: frontend/package.json

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint (biome)
        run: pnpm lint

      - name: Typecheck (tsc)
        run: pnpm typecheck

      - name: Test (vitest + coverage)
        run: |
          pnpm exec vitest run \
            --coverage \
            --coverage.reporter=text \
            --coverage.reporter=html \
            --coverage.reporter=json-summary \
            --coverage.reportsDirectory=./coverage \
            | tee vitest-output.txt

      - name: Append coverage summary
        if: always()
        run: |
          {
            echo "### Frontend coverage"
            echo
            if [ -f coverage/coverage-summary.json ]; then
              node -e '
                const s = require("./coverage/coverage-summary.json").total;
                const row = (k) => `| ${k} | ${s[k].pct}% (${s[k].covered}/${s[k].total}) |`;
                console.log("| Metric | Coverage |");
                console.log("| --- | --- |");
                console.log(row("statements"));
                console.log(row("branches"));
                console.log(row("functions"));
                console.log(row("lines"));
              '
            else
              echo '_No coverage summary produced._'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          if-no-files-found: warn
          retention-days: 14

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    # Only burn an e2e run if the unit suites are green — saves ~5min on
    # broken PRs while still covering the integration path.
    needs: [backend, frontend]
    defaults:
      run:
        working-directory: frontend
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v5

      - name: Install uv (with pinned Python)
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Sync backend deps
        working-directory: backend
        run: uv sync --frozen

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        # The config only uses chromium; --with-deps pulls the apt packages
        # Playwright needs on a fresh runner.
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        # `list` keeps every test on its own line in the GHA log so failures
        # are readable from the PR check page; `github` emits annotations
        # against the failing source lines; `html` is what gets uploaded as
        # the report artifact.
        run: pnpm exec playwright test --reporter=list,github,html

      - name: Upload Playwright report
        # Run unconditionally so we can inspect the report even when tests
        # pass (and so the artifact is created even if the run errored before
        # any spec executed).
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          if-no-files-found: warn
          retention-days: 14
