name: ci

# Lint, typecheck and test the whole repo on every PR + push to main.
# Each suite (backend pytest, frontend vitest, Playwright e2e) runs in its
# own job. Unit-test jobs upload coverage as workflow artifacts and write
# a one-line summary to the job page; the e2e job uploads the Playwright
# HTML report (always).
#
# Toolchain versions (python / uv / node) live in mise.toml — never
# duplicate them here. `jdx/mise-action` reads mise.toml and installs the
# pinned versions; `pnpm/action-setup` reads the `packageManager` field
# in frontend/package.json for the pnpm version. Lint/typecheck steps
# call `mise run <task>` so the exact same commands run locally and in CI.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same branch — only the latest commit's
# results matter, and PRs typically rebase several times.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - name: Setup mise toolchain (python + uv + node)
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Cache uv package downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('backend/uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Sync backend deps
        run: uv sync --frozen

      - name: Lint (ruff)
        run: mise run lint:backend

      - name: Typecheck (ty)
        run: mise run typecheck:backend

      - name: Test (pytest + coverage)
        run: |
          uv run pytest \
            --cov=backend \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            | tee pytest-output.txt

      - name: Append coverage summary
        if: always()
        run: |
          {
            echo "### Backend coverage"
            echo
            echo '```'
            sed -n '/^---* coverage:/,/^TOTAL/p' pytest-output.txt || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            backend/coverage.xml
            backend/htmlcov/
          if-no-files-found: warn
          retention-days: 14

  frontend:
    name: frontend (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - name: Setup mise toolchain (python + uv + node)
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Setup pnpm
        # `packageManager` in frontend/package.json is the single source of
        # truth for the pnpm version — no explicit `version:` here.
        uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint (biome)
        run: mise run lint:frontend

      - name: Typecheck (tsc)
        run: mise run typecheck:frontend

      - name: Test (vitest + coverage)
        run: |
          pnpm exec vitest run \
            --coverage \
            --coverage.reporter=text \
            --coverage.reporter=html \
            --coverage.reporter=json-summary \
            --coverage.reportsDirectory=./coverage \
            | tee vitest-output.txt

      - name: Append coverage summary
        if: always()
        run: |
          {
            echo "### Frontend coverage"
            echo
            if [ -f coverage/coverage-summary.json ]; then
              node -e '
                const s = require("./coverage/coverage-summary.json").total;
                const row = (k) => `| ${k} | ${s[k].pct}% (${s[k].covered}/${s[k].total}) |`;
                console.log("| Metric | Coverage |");
                console.log("| --- | --- |");
                console.log(row("statements"));
                console.log(row("branches"));
                console.log(row("functions"));
                console.log(row("lines"));
              '
            else
              echo '_No coverage summary produced._'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          if-no-files-found: warn
          retention-days: 14

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    # Only burn an e2e run if the unit suites are green — saves ~5min on
    # broken PRs while still covering the integration path.
    needs: [backend, frontend]
    defaults:
      run:
        working-directory: frontend
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v5

      - name: Setup mise toolchain (python + uv + node)
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - name: Cache uv package downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('backend/uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Sync backend deps
        working-directory: backend
        run: uv sync --frozen

      - name: Pre-warm backend imports
        # Importing the ASGI app once builds the __pycache__ for FastAPI +
        # gallery-dl + the backend package itself. Without this the first
        # `uv run uvicorn` (the one Playwright launches) easily eats the
        # webServer timeout budget on a cold runner, and any import error
        # surfaces here as a clear traceback instead of as an opaque
        # "Timed out waiting for webServer".
        working-directory: backend
        run: PYTHONPATH=. uv run python -c "import tests.e2e_server; print('e2e app import ok')"

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        # The config only uses chromium; --with-deps pulls the apt packages
        # Playwright needs on a fresh runner.
        run: pnpm exec playwright install --with-deps chromium

      - name: Start servers + wait for health
        # Boot the backend + frontend ourselves instead of relying on
        # Playwright's webServer feature so the subprocess output is in the
        # GHA log (Playwright captures it and only surfaces it on a timeout,
        # which the PR check page strips). All in one step so the started
        # processes survive long enough for the polling loop — `setsid`
        # detaches them into their own session and `</dev/null` drops the
        # step shell's stdin so they don't get SIGHUP'd when the step's
        # next sibling shell starts. The webServer config is still there
        # for local dev — reuseExistingServer=true lets Playwright pick
        # these up rather than racing a second start on the same port.
        env:
          VITE_API_PORT: "8765"
        run: |
          set -e
          mkdir -p logs ../backend/logs
          rm -rf ../backend/data-e2e

          (
            cd ../backend
            PYTHONPATH=. WEBUI_DATA_DIR=./data-e2e WEBUI_PORT=8765 \
              setsid uv run uvicorn tests.e2e_server:app \
                --host 127.0.0.1 --port 8765 --log-level info \
                </dev/null >logs/backend.log 2>&1 &
            echo "backend pid: $!"
          )

          setsid pnpm exec vite --host 127.0.0.1 --port 5174 --strictPort \
            </dev/null >logs/frontend.log 2>&1 &
          echo "frontend pid: $!"

          wait_for() {
            local name="$1" url="$2" log="$3"
            echo "::group::wait $name ($url)"
            for i in $(seq 1 90); do
              if curl -sf "$url" >/dev/null; then
                echo "$name up after ${i}s"
                echo "::endgroup::"
                return 0
              fi
              sleep 1
            done
            echo "::endgroup::"
            echo "::error::$name never came up"
            echo "---- $log ----"
            cat "$log" || echo "(no log produced)"
            return 1
          }

          wait_for backend  http://127.0.0.1:8765/api/health  ../backend/logs/backend.log
          wait_for frontend http://127.0.0.1:5174/            logs/frontend.log

      - name: Run Playwright tests
        # `list` keeps every test on its own line in the GHA log so failures
        # are readable from the PR check page; `github` emits annotations
        # against the failing source lines; `html` is what gets uploaded as
        # the report artifact.
        run: pnpm exec playwright test --reporter=list,github,html

      - name: Dump server logs
        if: always()
        run: |
          echo "::group::backend.log"
          cat ../backend/logs/backend.log || echo "(no backend log)"
          echo "::endgroup::"
          echo "::group::frontend.log"
          cat logs/frontend.log || echo "(no frontend log)"
          echo "::endgroup::"

      - name: Upload Playwright report
        # Run unconditionally so we can inspect the report even when tests
        # pass (and so the artifact is created even if the run errored before
        # any spec executed).
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
            frontend/logs/
            backend/logs/
          if-no-files-found: warn
          retention-days: 14
