name: docs

# Build and deploy the combined MkDocs Material + Storybook site to GitHub
# Pages. Toolchain versions (python / uv / node) live in mise.toml; pnpm
# version lives in frontend/package.json's "packageManager" field. Never
# duplicate them here.

on:
  push:
    branches: [main]
    paths:
      - "backend/src/**"
      - "backend/pyproject.toml"
      - "backend/uv.lock"
      - "frontend/src/**"
      - "frontend/.storybook/**"
      - "frontend/package.json"
      - "frontend/pnpm-lock.yaml"
      - "frontend/typedoc.json"
      - "frontend/tsconfig*.json"
      - "frontend/vite.config.ts"
      - "scripts/gen_*.py"
      - "docs/**"
      - "README.md"
      - "mkdocs.yml"
      - "mise.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Pages only allows one deploy at a time; serialize regenerations.
concurrency:
  group: docs
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup mise toolchain (python + uv + node)
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Activate pnpm via corepack
        run: corepack enable

      - name: Resolve pnpm store path
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Cache uv package downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-docs-${{ runner.os }}-${{ hashFiles('backend/uv.lock') }}
          restore-keys: uv-docs-${{ runner.os }}-

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Sync backend with docs group
        working-directory: backend
        run: uv sync --frozen --group docs

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build docs site (TypeDoc + MkDocs --strict)
        # `docs:check` generates the TypeScript reference (via the
        # docs:typescript dependency) then runs `mkdocs build --strict` —
        # the same strict build used to gate CI locally.
        run: mise run docs:check

      - name: Build Storybook
        run: mise run docs:storybook:build

      - name: Assemble combined Pages tree
        run: mv frontend/storybook-static site/storybook

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
