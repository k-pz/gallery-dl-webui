name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "scripts/dump-openapi.py"
      - "scripts/build-docs.sh"
      - "backend/src/**"
      - "backend/pyproject.toml"
      - "backend/uv.lock"
      - "README.md"
      - "ARCHITECTURE.md"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "scripts/dump-openapi.py"
      - "scripts/build-docs.sh"
      - "backend/src/**"
      - "backend/pyproject.toml"
      - "backend/uv.lock"
      - "README.md"
      - "ARCHITECTURE.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Allow only one concurrent deployment; in-flight runs are cancelled when a
# new commit lands on main so the site always reflects HEAD.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv (with pinned Python)
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      # `requires-python = ">=3.14"` in backend/pyproject.toml — uv will
      # download a matching interpreter if the runner image doesn't ship one.
      - name: Sync backend with docs group
        working-directory: backend
        run: uv sync --frozen --group docs

      - name: Build site
        run: bash scripts/build-docs.sh

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
