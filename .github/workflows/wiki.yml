name: wiki

on:
  push:
    branches: [main]
    paths:
      - "backend/src/**"
      - "backend/pyproject.toml"
      - "backend/uv.lock"
      - "scripts/build-wiki.py"
      - "README.md"
      - "docs/**"
      - ".github/workflows/wiki.yml"
  workflow_dispatch:

# One regeneration at a time so two pushes don't race the wiki repo.
concurrency:
  group: wiki
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v5

      # The wiki lives in a sibling git repo at <repo>.wiki.git. It is only
      # provisioned once the user creates a page through the GitHub UI, so a
      # missing remote = "wiki not enabled yet" — surface a clear error.
      - name: Checkout wiki repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git"
          if ! git clone --depth=1 "${WIKI_URL}" wiki 2>/tmp/wiki-clone.err; then
            cat /tmp/wiki-clone.err >&2
            echo
            echo "❌ Wiki clone failed. The wiki must be enabled and contain at"
            echo "   least one page before this workflow can push to it."
            echo "   → Settings → Features → Wikis → enable, then create a"
            echo "     page (e.g. Home) once via the GitHub UI."
            exit 1
          fi

      - name: Install uv (with pinned Python)
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Sync backend with docs group
        working-directory: backend
        run: uv sync --frozen --group docs

      - name: Generate wiki content
        working-directory: backend
        run: uv run --group docs python ../scripts/build-wiki.py ../wiki

      - name: Commit + push if changed
        working-directory: wiki
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes; nothing to push."
            exit 0
          fi
          git commit -m "docs: regenerate from ${{ github.repository }}@${{ github.sha }}"
          git push
