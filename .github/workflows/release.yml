name: release

# Manually-triggered release: runs `mise run release:bump` on `main`, which
# walks conventional commits since the last `v*` tag, computes the next
# semver, rewrites version literals listed in `.cz.toml`, appends a
# `CHANGELOG.md` entry, makes a `bump: …` commit, and tags it `v$version`.
# We then push the commit + tag back to origin/main and upload the tag name
# as a `release-tag` artifact. `tag-release.yml` chains off this workflow
# via `workflow_run` and reads the artifact to know which tag to publish —
# we can't rely on the tag-push event to trigger it because GitHub silently
# suppresses workflow runs for events created by `GITHUB_TOKEN`.
#
# The `increment` input lets the human override commit-derived bump:
#   - auto  → cz analyses conventional commits (default behaviour)
#   - patch / minor / major → forces that bump regardless of commit types
#
# The `release_candidate` input flips on `--prerelease rc`, producing semver
# prereleases like `v1.2.0-rc.1`. Run the workflow with it on repeatedly to
# advance the rc counter; flip it off to promote the rc to a final release.
# `tag-release.yml` reads the tag shape and marks rc tags as prereleases on
# the resulting GitHub Release.
#
# No auto-trigger: ship cadence is a human decision. If `cz bump` finds no
# bump-worthy commits since the last tag it exits with code 21 / 3 — we treat
# either as a no-op (the explicit rc check on the bump step).

on:
  workflow_dispatch:
    inputs:
      increment:
        description: "Version bump (auto = derive from conventional commits since last tag)"
        required: true
        default: auto
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
      release_candidate:
        description: "Cut a release candidate (`-rc.N` prerelease) instead of a final release"
        required: false
        default: false
        type: boolean

# Serialize bumps so two clicks can't race to tag the same version.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          # cz reads the full history to find the previous tag.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup mise toolchain (python + uv + node)
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version (commitizen, via mise)
        id: bump
        # cz exits 21 (NoCommitsFoundError) or 3 (NoCommitsIncrement) when
        # there's nothing to release — capture that as a no-op rather than
        # failing the run. With an explicit `--increment`, cz still requires
        # at least one new commit since the last tag; the same rc check covers
        # the "nothing to bump" path.
        env:
          INCREMENT: ${{ inputs.increment }}
          RELEASE_CANDIDATE: ${{ inputs.release_candidate }}
        run: |
          # Pick the rc-aware task when release_candidate=true; the `:rc`
          # variant adds `--prerelease rc`. Extra `--increment` args pass
          # through mise's trailing-args behaviour to `cz bump`.
          if [ "$RELEASE_CANDIDATE" = "true" ]; then
            task=release:bump:rc
          else
            task=release:bump
          fi
          extra_args=()
          if [ "$INCREMENT" != "auto" ]; then
            # cz expects MAJOR|MINOR|PATCH; the input is lowercase for UX.
            extra_args+=(--increment "$(echo "$INCREMENT" | tr '[:lower:]' '[:upper:]')")
          fi
          set +e
          mise run "$task" -- "${extra_args[@]}"
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          elif [ "$rc" -eq 3 ] || [ "$rc" -eq 21 ]; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "No bump-worthy commits since last tag — nothing to release."
          else
            exit "$rc"
          fi

      - name: Sync backend/uv.lock to the bumped version
        if: steps.bump.outputs.bumped == 'true'
        # `cz bump` only rewrites the files listed in `.cz.toml`'s
        # `version_files` — backend/pyproject.toml et al. It doesn't touch
        # backend/uv.lock, whose top-level `[[package]] name = "backend"
        # version = "…"` block carries the package version, so the lockfile
        # drifts on every bump until the next `uv` invocation regenerates it.
        # Run `uv lock` here so the synced lockfile ships in the same push as
        # the bump commit. We follow it up with a separate `chore(release):
        # sync uv.lock` commit (rather than amending the bump commit) so the
        # `v$version` tag created by cz stays on its original SHA and we
        # don't have to retag.
        run: |
          cd backend && uv lock
          cd ..
          if ! git diff --quiet -- backend/uv.lock; then
            git add backend/uv.lock
            git commit -m "chore(release): sync uv.lock"
          fi

      - name: Push commit + tag
        if: steps.bump.outputs.bumped == 'true'
        run: git push --follow-tags origin main

      - name: Record published tag for downstream workflows
        if: steps.bump.outputs.bumped == 'true'
        # `git describe --tags --abbrev=0` walks back from HEAD to the nearest
        # tag — we can't use `--exact-match HEAD` here because the lockfile
        # sync step above adds a `chore(release): sync uv.lock` commit on top
        # of the tagged bump commit, so HEAD itself is no longer at the tag.
        run: |
          mkdir -p artifacts
          git describe --tags --abbrev=0 > artifacts/tag

      - name: Upload release-tag artifact
        if: steps.bump.outputs.bumped == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-tag
          path: artifacts/tag
          if-no-files-found: error
          retention-days: 7
