name: release

# Cuts a release when `develop` is merged into `main` (the only sanctioned
# path to ship under the trimmed gitflow used by this repo — see
# CONTRIBUTING.md). Listens to PR-close events on `main` and runs only when
# the merged PR's head branch was `develop`.
#
# On a matching merge:
#   1. `cz bump` walks the conventional commits since the last v$version tag.
#   2. If a bump is warranted, version literals listed in `.cz.toml` get
#      rewritten, CHANGELOG.md gets an entry, a `bump:` commit is created
#      and tagged `v$version`, and both get pushed back to main.
#   3. A GitHub Release is created with the new CHANGELOG section as body.
#
# Direct pushes to main (e.g. hotfixes the human applies straight to main
# without going through develop) do NOT trigger this workflow — use
# `workflow_dispatch` if you want a manual bump in that case.
#
# If no bump-worthy commits exist, cz exits with code 21 (NoCommitsFoundError)
# or 3 (NoCommitsIncrement) and we treat that as a no-op.

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

# Serialize bumps so two pushes can't race to tag the same version.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  bump:
    # Only run when:
    #   - manually dispatched, OR
    #   - the closing event is a real merge (not a "closed without merging")
    #     of a PR whose head was `develop` and base was `main`.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       github.event.pull_request.head.ref == 'develop' &&
       github.event.pull_request.base.ref == 'main')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          # PR-close events default to the merge commit ref, not the branch
          # tip — force `main` so the push at the end has somewhere to land.
          ref: main
          # cz reads the full history to find the previous tag.
          fetch-depth: 0
          # Default GITHUB_TOKEN can push to main as long as branch protection
          # doesn't require PR review for the actions bot. If that's ever
          # enabled, swap to a PAT stored as RELEASE_TOKEN.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync with tip of origin/main
        # Another develop→main PR could land between this job's trigger and
        # checkout. Fetch + fast-forward before bumping so the new commit
        # applies on top of everything, and the final push has nothing to
        # reject.
        run: |
          git fetch origin main --tags
          git pull --ff-only origin main

      - name: Bump version + push
        id: bump
        run: |
          set -u
          # `cz bump` rewrites version files, updates CHANGELOG.md, commits as
          # "bump: …", and creates a v$version tag. --yes skips the prompt.
          set +e
          uv tool run --from commitizen cz bump --yes --changelog
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            VERSION=$(uv tool run --from commitizen cz version --project)
            # cz can't rewrite the workspace package's version inside uv.lock
            # (the line isn't unique), so refresh the lock and fold any
            # resulting diff into the bump commit + tag.
            (cd backend && uv lock)
            if ! git diff --quiet backend/uv.lock; then
              git add backend/uv.lock
              git commit --amend --no-edit
              # `-fa` (annotated, force) — `git tag -f` alone would create a
              # lightweight tag, which `git push --follow-tags` silently
              # skips, leaving origin with the bump commit but no tag.
              git tag -fa "v${VERSION}" -m "bump: v${VERSION}"
            fi
            git push --follow-tags
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          elif [ "$rc" -eq 21 ] || [ "$rc" -eq 3 ]; then
            # 21 = NoCommitsFoundError (nothing since last tag)
            #  3 = NoCommitsIncrement (commits exist but none bump-worthy)
            echo "No bump-worthy commits since last tag — nothing to release."
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          else
            exit "$rc"
          fi

      - name: Create GitHub Release
        if: steps.bump.outputs.bumped == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          # Carve the just-inserted CHANGELOG section out for the release
          # body. Sections start with "## vX.Y.Z (YYYY-MM-DD)"; capture
          # everything until the next "## " heading.
          notes=$(awk -v v="v${VERSION}" '
            /^## / {
              if (in_section) exit
              if ($2 == v) { in_section = 1; next }
            }
            in_section
          ' CHANGELOG.md)
          if [ -z "$notes" ]; then
            notes="Release v${VERSION}"
          fi
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "$notes"
