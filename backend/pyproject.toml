[project]
name = "backend"
version = "0.1.0"
description = "gallery-dl-webui backend"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "aiosqlite>=0.21",
    "fastapi[standard]>=0.136.1",
    "gallery-dl>=1.32",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/backend"]

[dependency-groups]
dev = [
    "poethepoet>=0.46.0",
    "ruff>=0.15.13",
    "ty>=0.0.37",
]

[tool.ruff]
line-length = 100
target-version = "py314"
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "RUF"]

[tool.ty.src]
include = ["src/backend"]

[tool.poe.tasks]
dev = "uvicorn backend.app:app --reload"
lint = "ruff check ."
format = "ruff format ."
format-check = "ruff format --check ."
typecheck = "ty check"

[tool.poe.tasks.frontend-dev]
shell = "cd ../frontend && pnpm dev"
help = "Run the Vite dev server (proxies /api to :8000)"

[tool.poe.tasks.check]
sequence = ["lint", "format-check", "typecheck"]
help = "Run all read-only checks (CI-safe)"

[tool.poe.tasks.fix]
shell = "ruff check --fix . && ruff format ."
help = "Auto-fix lint findings and reformat"
