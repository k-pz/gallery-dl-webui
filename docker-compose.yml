# gallery-dl-webui — production compose
#
# Single service that serves the FastAPI backend + built SPA on port 8000.
# Bring up with `docker compose up -d`; logs with `docker compose logs -f`.
#
# Persistence:
#   ./data        → jobs.db, archive.db, raw downloads. Always mount.
#   ./media       → optional CBZ output root. Mount only when postprocess is
#                   enabled and the Config tab's "Root" is set to /media.

services:
  webui:
    build:
      context: .
      dockerfile: Dockerfile
    image: gallery-dl-webui:latest
    container_name: gallery-dl-webui
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      WEBUI_HOST: "0.0.0.0"
      WEBUI_PORT: "8000"
      WEBUI_DATA_DIR: /data
    volumes:
      # Backend data — jobs.db, archive.db, raw downloads.
      - ./data:/data
      # Postprocess output root (CBZ + series.json). Mount when you want the
      # packed library to land outside the data dir (e.g. a NAS share).
      # Keep the path in sync with the "Root" you set in the Config tab.
      - ./media:/media
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
